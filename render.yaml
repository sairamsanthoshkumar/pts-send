# render.yaml — PtsSEND Blueprint for Render.com

services:

  # ── Redis / Key Value ──────────────────────────────────────
  - type: keyvalue
    name: pts-send-redis
    plan: free
    ipAllowList: []

  # ── Backend (FastAPI + Celery inline) ─────────────────────
  - type: web
    name: pts-send-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pts-send-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: pts-send-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: pts-send-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: pts-send-redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://pts-send-frontend.onrender.com
      - key: CORS_ORIGINS
        value: '["https://pts-send-frontend.onrender.com","http://localhost:5173"]'

  # ── Frontend (React static site) ──────────────────────────
  # VITE_API_URL must be a hardcoded value — fromService doesn't resolve
  # at static build time. Use the known backend URL directly.
  - type: web
    name: pts-send-frontend
    runtime: static
    buildCommand: cd frontend && npm install && VITE_API_URL=https://pts-send-backend.onrender.com npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL ─────────────────────────────────────────────
databases:
  - name: pts-send-db
    plan: free
    databaseName: ptssend
    user: ptssend
